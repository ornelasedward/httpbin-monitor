# Railway config for the web service (Vite static build + serve).
# In the Railway dashboard: Service → Settings → Config file → /railway/web.toml
# Do not set a Root Directory — build from the monorepo root.
#
# Set VITE_API_URL and VITE_WS_URL on this service BEFORE deploy (build-time vars).

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @httpbin-monitor/shared build && pnpm --filter web build"
watchPatterns = ["apps/web/**", "packages/shared/**", "pnpm-lock.yaml", "railway/web.toml", "package.json"]

[deploy]
startCommand = "pnpm --filter web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

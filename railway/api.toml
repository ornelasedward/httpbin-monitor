# Railway config for the API service (Express + Socket.IO + scheduler).
# In the Railway dashboard: Service → Settings → Config file → /railway/api.toml
# Do not set a Root Directory — build from the monorepo root so workspace packages resolve.

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @httpbin-monitor/shared build && pnpm --filter api exec prisma generate && pnpm --filter api exec prisma migrate deploy && pnpm --filter api build"
watchPatterns = ["apps/api/**", "packages/shared/**", "pnpm-lock.yaml"]

[deploy]
startCommand = "pnpm --filter api start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300
